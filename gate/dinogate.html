<!DOCTYPE html>
<html lang="en" class="offline">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#fff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
                                 maximum-scale=1.0, user-scalable=no">
  <title></title>
  <link rel="stylesheet" href="dinogate.css">
</head>
<body>
  <div id="main-frame-error" class="interstitial-wrapper">
    <div id="main-content">
      <div class="icon icon-offline"></div>
      <div id="main-message">
        <h1>
          <span jsselect="heading" jsvalues=".innerHTML:msg">No internet</span>
        </h1>
        <p id="main-message-details">
          <span jsselect="summary" jsvalues=".innerHTML:msg">Try:</span>
        </p>
        <div id="suggestions-list">
          <p>Checking the network cables, modem, and router</p>
        </div>
        <div id="error-code">ERR_INTERNET_DISCONNECTED</div>
      </div>
    </div>
    <!-- The Runner game is injected here by offline.js -->
  </div>

  <!-- DinoGate UI — subtle additions below the game area -->
  <div id="dinogate-ui">
    <div id="gate-hint">Score 50+ three times in a row. Easy, right?</div>
    <div id="streak"></div>
    <div id="unlock-area">
      <div id="time-input-area">
        <span id="time-label-before">allow</span>
        <input id="time-input" type="number" min="1" max="7200" step="1" value="600" />
        <span id="time-label-after">seconds</span>
      </div>
      <div id="proceed-link"></div>
    </div>
  </div>

  <div id="offline-resources">
    <img id="offline-resources-1x" src="100-offline-sprite.png">
    <img id="offline-resources-2x" src="200-offline-sprite.png">
    <template id="audio-resources"></template>
  </div>

  <script src="offline.js"></script>
  <script src="dinogate.js"></script>
</body>
</html>
